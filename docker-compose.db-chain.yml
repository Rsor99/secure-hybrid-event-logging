services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: logging_benchmark
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  exonum-config:
    image: exonum/exonum-node:latest
    volumes:
      - ./exonum-data:/opt/exonum/data
    entrypoint: /bin/sh -c "if [ ! -f /opt/exonum/data/node-0.toml ]; then exonum-node generate-testnet --count 3 --output-dir /opt/exonum/data; fi"

  node-0:
    image: exonum/exonum-node:latest
    depends_on:
      exonum-config:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
      - "6331:6331"
    volumes:
      - ./exonum-data/node-0:/opt/exonum/data
    command: ["run", "--config", "/opt/exonum/data/node.toml", "--db-path", "/opt/exonum/data/db"]

  node-1:
    image: exonum/exonum-node:latest
    depends_on:
      - node-0
    ports:
      - "8001:8000"
      - "6332:6331"
    volumes:
      - ./exonum-data/node-1:/opt/exonum/data
    command: ["run", "--config", "/opt/exonum/data/node.toml", "--db-path", "/opt/exonum/data/db"]

  node-2:
    image: exonum/exonum-node:latest
    depends_on:
      - node-0
    ports:
      - "8002:8000"
      - "6333:6331"
    volumes:
      - ./exonum-data/node-2:/opt/exonum/data
    command: ["run", "--config", "/opt/exonum/data/node.toml", "--db-path", "/opt/exonum/data/db"]

volumes:
  pgdata:
  mongodata:
