# Full stack (excluding Exonum private chain).
# Exonum lives in exonum-logstore/docker-compose.yml — run that separately:
#   cd exonum-logstore && docker compose up -d
# Then EXONUM_NODE_URL below points to it via host.docker.internal.

services:
  # ── Infrastructure ───────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: secure_hybrid_event_logging
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API ──────────────────────────────────────────────────────────────────────

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: 3000

      # PostgreSQL
      PG_HOST: postgres
      PG_PORT: 5432
      PG_NAME: secure_hybrid_event_logging
      PG_USER: postgres
      PG_PASSWORD: postgres
      PG_POOL_SIZE: 20

      # MongoDB
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB_NAME: secure_hybrid_event_logging
      MONGO_POOL_SIZE: 20

      # Ethereum (Sepolia) — set in your .env, passed through here
      ETH_RPC_URL: ${ETH_RPC_URL}
      ETH_PRIVATE_KEY: ${ETH_PRIVATE_KEY}
      ETH_LOG_CONTRACT: ${ETH_LOG_CONTRACT}
      ETH_HASH_CONTRACT: ${ETH_HASH_CONTRACT}
      ETH_BATCH_CONTRACT: ${ETH_BATCH_CONTRACT}
      ETH_CONFIRMATION_BLOCKS: 3

      # Exonum private chain — running on the host via exonum-logstore compose
      EXONUM_NODE_URL: http://host.docker.internal:8200
      EXONUM_PUBLIC_KEY: ${EXONUM_PUBLIC_KEY}
      EXONUM_SECRET_KEY: ${EXONUM_SECRET_KEY}
      EXONUM_LOG_SERVICE_ID: 100
      EXONUM_LOG_SERVICE_NAME: log-service
      EXONUM_HASH_SERVICE_ID: 101
      EXONUM_HASH_SERVICE_NAME: hash-service
      EXONUM_BATCH_SERVICE_ID: 102
      EXONUM_BATCH_SERVICE_NAME: batch-service

      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      EXPORT_DIR: /app/results
    extra_hosts:
      # Lets `host.docker.internal` resolve on Linux too (already works on Docker Desktop)
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./results:/app/results

  # ── Frontend ─────────────────────────────────────────────────────────────────

  frontend:
    build: ./hybrid-logging-frontend
    ports:
      - "5173:80"
    depends_on:
      - app

volumes:
  pgdata:
  mongodata:
  rabbitmq_data:
